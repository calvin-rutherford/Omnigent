version: "3.8"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: omnigent
      POSTGRES_PASSWORD: password
      POSTGRES_DB: omnigent_db
    # Port removed so it doesn't conflict with any local postgres on the VPS
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omnigent -d omnigent_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: omnigent
      RABBITMQ_DEFAULT_PASS: password
    # Ports removed to prevent conflicts
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  redis:
    image: redis:7
    # Port removed to fix the 'address already in use' error (Host has local redis)
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  broker:
    build: .
    command: bash -c "cd backend && daphne -b 0.0.0.0 -p 8000 og_broker.asgi:application"
    volumes:
      - .:/app
    ports:
      - "8000:8000" # Only the web server needs to be exposed for the TUI to connect to!
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://omnigent:password@db:5432/omnigent_db
      - CELERY_BROKER_URL=amqp://omnigent:password@rabbitmq:5672//
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - CHANNEL_LAYER_REDIS_URL=redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: bash -c "cd backend && celery -A og_broker worker -l info"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://omnigent:password@db:5432/omnigent_db
      - CELERY_BROKER_URL=amqp://omnigent:password@rabbitmq:5672//
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - CHANNEL_LAYER_REDIS_URL=redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
